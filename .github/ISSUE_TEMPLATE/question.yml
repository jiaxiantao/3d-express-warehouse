name: Question
description: Ask how to use, deploy, or integrate this project
title: "[Question]: "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in **3D Express Warehouse**!
        For bugs or feature ideas, please use the other templates instead.
  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What are you trying to do?
    validations:
      required: true
  - type: dropdown
    id: topic
    attributes:
      label: Topic
      options:
        - Local development
        - GitHub Pages / deployment
        - WMS / API integration
        - 3D scene / layout customization
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Node version, browser, fork URL, or relevant code snippets
